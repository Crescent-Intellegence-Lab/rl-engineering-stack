name: Build presentation

on:
  push:
    paths:
      - "presentation/src/part-*"
      - "presentation/src/build.js"
      - "presentation/package.json"
      - ".github/workflows/build-presentation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: presentation
        run: npm install --ignore-scripts

      - name: Generate PowerPoint
        working-directory: presentation
        run: npm run build

      - name: Commit generated deck
        run: |
          if git diff --quiet -- presentation/rl-engineering-tools-landscape.pptx presentation/src/rl-engineering-tools-landscape.js; then
            echo "Presentation is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add presentation/rl-engineering-tools-landscape.pptx presentation/src/rl-engineering-tools-landscape.js
          git commit -m "Build presentation deck"
          git push
