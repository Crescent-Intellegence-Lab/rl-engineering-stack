name: Build student presentation PDF

on:
  push:
    paths:
      - "presentation/slides.md"
      - ".github/workflows/build-presentation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Render student PDF with Marp
        run: |
          npx --yes @marp-team/marp-cli presentation/slides.md \
            --pdf \
            --output presentation/rl-engineering-tools-student-facing.pdf

      - name: Commit generated PDF
        run: |
          if git diff --quiet -- presentation/rl-engineering-tools-student-facing.pdf; then
            echo "PDF is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add presentation/rl-engineering-tools-student-facing.pdf
          git commit -m "Build student presentation PDF"
          git push
