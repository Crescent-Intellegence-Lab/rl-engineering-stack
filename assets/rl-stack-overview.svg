<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="320" viewBox="0 0 1400 320" role="img" aria-labelledby="title desc">
  <title id="title">Reinforcement Learning Engineering Stack</title>
  <desc id="desc">A layered diagram from environments and algorithms to distributed training, LLM rollouts, and agentic reinforcement learning.</desc>
  <style>
    .title { font: 700 30px system-ui, sans-serif; fill: #111827; }
    .label { font: 700 18px system-ui, sans-serif; fill: #111827; }
    .text { font: 15px system-ui, sans-serif; fill: #374151; }
    .box { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 14; }
    .arrow { stroke: #475569; stroke-width: 3; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1400" height="320" fill="#ffffff"/>
  <text x="700" y="42" text-anchor="middle" class="title">Reinforcement Learning Engineering Stack</text>
  <rect x="35" y="95" width="220" height="145" class="box"/>
  <text x="145" y="130" text-anchor="middle" class="label">Environment Layer</text>
  <text x="145" y="162" text-anchor="middle" class="text">Gymnasium · PettingZoo</text>
  <text x="145" y="190" text-anchor="middle" class="text">Minari · EnvPool</text>
  <rect x="305" y="95" width="220" height="145" class="box"/>
  <text x="415" y="130" text-anchor="middle" class="label">Algorithm Layer</text>
  <text x="415" y="162" text-anchor="middle" class="text">CleanRL · SB3 · Tianshou</text>
  <text x="415" y="190" text-anchor="middle" class="text">TorchRL · DI-engine</text>
  <rect x="575" y="95" width="220" height="145" class="box"/>
  <text x="685" y="130" text-anchor="middle" class="label">Distributed Training</text>
  <text x="685" y="162" text-anchor="middle" class="text">RLlib · Ray · FSDP</text>
  <text x="685" y="190" text-anchor="middle" class="text">DeepSpeed · Megatron</text>
  <rect x="845" y="95" width="220" height="145" class="box"/>
  <text x="955" y="130" text-anchor="middle" class="label">LLM RL Layer</text>
  <text x="955" y="162" text-anchor="middle" class="text">TRL · OpenRLHF · veRL</text>
  <text x="955" y="190" text-anchor="middle" class="text">NeMo RL · ms-swift · slime</text>
  <rect x="1115" y="95" width="250" height="145" class="box"/>
  <text x="1240" y="130" text-anchor="middle" class="label">Agentic RL</text>
  <text x="1240" y="162" text-anchor="middle" class="text">AReaL · SkyRL · rLLM</text>
  <text x="1240" y="190" text-anchor="middle" class="text">Agent Lightning</text>
  <line x1="255" y1="167" x2="300" y2="167" class="arrow"/>
  <line x1="525" y1="167" x2="570" y2="167" class="arrow"/>
  <line x1="795" y1="167" x2="840" y2="167" class="arrow"/>
  <line x1="1065" y1="167" x2="1110" y2="167" class="arrow"/>
  <text x="700" y="285" text-anchor="middle" class="text">Environment → data collection → optimization → scalable rollout → long-horizon interaction</text>
</svg>
